name: kernel

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: i386
            triple: i386-elf
          - arch: x86_64
            triple: x86_64-elf
          - arch: aarch64
            triple: aarch64-elf
          - arch: arm32
            triple: arm-none-eabi
          - arch: rv64
            triple: riscv64-elf
          - arch: rv32
            triple: riscv32-elf
          - arch: loongarch64
            triple: loongarch64-elf
          - arch: mips
            triple: mips-elf
          - arch: mips64
            triple: mips64-elf
          - arch: ppc
            triple: powerpc-eabi
          - arch: ppc64
            triple: powerpc64-elf
    steps:
      - uses: actions/checkout@v4
      - uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest
      - name: Install toolchain dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bison flex texinfo libgmp-dev libmpfr-dev libmpc-dev zlib1g-dev
      - name: Cache cross toolchain
        uses: actions/cache@v4
        with:
          path: toolchains/${{ matrix.triple }}
          key: ok-${{ matrix.triple }}-binutils-2.42-gcc-14.2.0
      - name: Build cross GCC/binutils
        run: scripts/build-toolchain.sh --arch ${{ matrix.arch }} --jobs 2
      - name: Configure architecture
        run: xmake f -c -m debug -a ${{ matrix.arch }}
      - name: Check toolchain
        run: xmake toolchain-check
      - name: Build kernel library
        run: xmake -y -b okernel
      - name: Check freestanding link closure
        run: |
          toolchains/${{ matrix.triple }}/bin/${{ matrix.triple }}-ld -r --whole-archive build/linux/${{ matrix.arch }}/debug/libokernel.a -o /tmp/okernel-${{ matrix.triple }}.o
          test -z "$(toolchains/${{ matrix.triple }}/bin/${{ matrix.triple }}-nm -u /tmp/okernel-${{ matrix.triple }}.o)"
      - name: Run architecture test
        run: xmake test
